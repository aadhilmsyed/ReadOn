name: Deploy ReadOn (reusable)

on:
  workflow_call:
    inputs:
      readon_deploy_env:
        required: true
        type: string
        description: "prod or test"
      gcp_project_id:
        required: true
        type: string
      workload_identity_provider:
        required: true
        type: string
      service_account:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: readon-deploy-${{ inputs.readon_deploy_env }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Validate workflow inputs
        env:
          GCP: ${{ inputs.gcp_project_id }}
          WIF: ${{ inputs.workload_identity_provider }}
          SA: ${{ inputs.service_account }}
          ENV_NAME: ${{ inputs.readon_deploy_env }}
        run: |
          set -euo pipefail
          if [[ "${ENV_NAME}" != "prod" && "${ENV_NAME}" != "test" ]]; then
            echo "ERROR: readon_deploy_env must be prod or test (got: ${ENV_NAME})" >&2
            exit 1
          fi
          if [[ -z "${GCP}" || -z "${WIF}" || -z "${SA}" ]]; then
            echo "ERROR: One or more GitHub Actions Variables are unset; workflow inputs are empty." >&2
            echo "Configure repository Variables (Settings → Secrets and variables → Actions → Variables) with these exact names:" >&2
            [[ -z "${GCP}" ]] && echo "  - missing: GCP_PROJECT_ID" >&2
            [[ -z "${WIF}" ]] && echo "  - missing: WORKLOAD_IDENTITY_PROVIDER" >&2
            if [[ -z "${SA}" ]]; then
              if [[ "${ENV_NAME}" == "test" ]]; then
                echo "  - missing: CICD_SERVICE_ACCOUNT_TEST (required for pushes to dev)" >&2
              else
                echo "  - missing: CICD_SERVICE_ACCOUNT_PROD (required for pushes to main)" >&2
              fi
            fi
            echo "See docs/github-actions-setup.md" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF / OIDC)
        uses: google-github-actions/auth@v2.1.9
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2.1.5
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Deploy Cloud Run stack
        env:
          READON_DEPLOY_ENV: ${{ inputs.readon_deploy_env }}
          SERVICE_VERSION: ${{ github.sha }}
          GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
        run: bash ops/gcp/deploy-stack.sh

      - name: Verify health and access model
        env:
          READON_DEPLOY_ENV: ${{ inputs.readon_deploy_env }}
          GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
        run: bash ops/gcp/verify/verify-health.sh

      - name: Job summary
        if: success()
        env:
          ENV_NAME: ${{ inputs.readon_deploy_env }}
          GCP: ${{ inputs.gcp_project_id }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: |
          {
            echo "## ReadOn deploy"
            echo "- **Branch:** ${REF}"
            echo "- **READON_DEPLOY_ENV:** ${ENV_NAME}"
            echo "- **GCP_PROJECT_ID:** ${GCP}"
            echo "- **SERVICE_VERSION (git sha):** \`${SHA}\`"
            echo "- **Status:** completed successfully (deploy + verify)"
          } >> "${GITHUB_STEP_SUMMARY}"
